apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workloads-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<YOUR_GITHUB>/idp-platform-day2.git
    targetRevision: main
    path: gitops/workloads/dev
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
